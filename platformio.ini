[env:atmega328pb]
platform = atmelavr
board = ATmega328PB
framework =
board_build.f_cpu = 16000000L

upload_protocol = arduino
upload_port = /dev/ttyUSB0
upload_speed = 115200
upload_flags = -F

build_flags =
    -std=gnu11
    -Wall
    -Wl,-u,vfprintf,-lprintf_min ; drops printf float support to save space in flash mem

extra_scripts = post:scripts/copy_compile_commands.py
